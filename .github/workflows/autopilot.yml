# Autopilota schedulato: esegue l'intera piattaforma nel cloud, senza alcun
# intervento manuale, e archivia i risultati (report + EA) come artifact.
# Si puo' anche lanciare a mano dalla tab "Actions" (workflow_dispatch).
name: Autopilot

on:
  workflow_dispatch:            # esecuzione manuale on-demand
    inputs:
      instruments:
        description: "Strumenti separati da spazio (vuoto = default)"
        required: false
        default: ""
  schedule:
    - cron: "17 6 * * 1"        # ogni lunedi' alle 06:17 UTC (minuto spaiato)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run autopilot
        # --no-download: in CI usa dati locali (se presenti in datasets/) o il
        # fallback sintetico, per una run deterministica e senza dipendenze di rete.
        run: |
          if [ -n "${{ github.event.inputs.instruments }}" ]; then
            python -m trading_ai --no-download --instruments ${{ github.event.inputs.instruments }}
          else
            python -m trading_ai --no-download
          fi

      - name: Upload risultati (report + modelli)
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-reports
          path: |
            reports/runs/**
            models/**
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Expert Advisor
        uses: actions/upload-artifact@v4
        with:
          name: expert-advisors
          path: |
            mql4/*.mq4
            mql5/*.mq5
          if-no-files-found: ignore
          retention-days: 30
