# Autopilota schedulato: esegue l'intera piattaforma nel cloud, senza alcun
# intervento manuale, e archivia i risultati (report + EA) come artifact.
# Si puo' anche lanciare a mano dalla tab "Actions" (workflow_dispatch).
name: Autopilot

on:
  workflow_dispatch:            # esecuzione manuale on-demand
    inputs:
      instruments:
        description: "Strumenti separati da spazio"
        required: false
        default: "XAUUSD"
  schedule:
    - cron: "17 6 * * 1"        # ogni lunedi' alle 06:17 UTC (minuto spaiato)

# Il dataset Kaggle con i dati storici (usato se il secret KAGGLE_API_TOKEN
# e' configurato). Cambialo qui se usi un altro dataset.
env:
  KAGGLE_DATASET: melomac/histdata

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run autopilot
        # Se il secret KAGGLE_API_TOKEN e' configurato, scarica i dati reali dal
        # dataset Kaggle; altrimenti ripiega su dati sintetici (run deterministica).
        # Il token viene letto SOLO da secret cifrato: mai scritto nel repository.
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          INSTR="${{ github.event.inputs.instruments }}"
          INSTR="${INSTR:-XAUUSD}"
          # Sanifichiamo il token: se per errore il secret contiene 'export X=...'
          # prendiamo la parte dopo l'ultimo '='; togliamo spazi/virgolette/newline.
          TOKEN="$KAGGLE_API_TOKEN"
          TOKEN="${TOKEN##*=}"
          TOKEN="$(printf '%s' "$TOKEN" | tr -d '[:space:]\"'"'")"
          if [ -n "$TOKEN" ]; then
            mkdir -p ~/.kaggle
            printf '%s' "$TOKEN" > ~/.kaggle/access_token
            chmod 600 ~/.kaggle/access_token
            export KAGGLE_API_TOKEN="$TOKEN"
            echo "Dati reali da Kaggle ($KAGGLE_DATASET)"
            # Se l'auth Kaggle fallisce, l'autopilota ripiega da solo sui dati
            # locali/sintetici: la run non deve fallire per questo.
            python -m trading_ai --instruments $INSTR --kaggle-dataset "$KAGGLE_DATASET"
          else
            echo "Secret KAGGLE_API_TOKEN assente: uso dati locali/sintetici."
            python -m trading_ai --instruments $INSTR --no-download
          fi

      - name: Upload risultati (report + modelli)
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-reports
          path: |
            reports/runs/**
            models/**
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Expert Advisor
        uses: actions/upload-artifact@v4
        with:
          name: expert-advisors
          path: |
            mql4/*.mq4
            mql5/*.mq5
          if-no-files-found: ignore
          retention-days: 30

      - name: Notifica Telegram (riepilogo + EA)
        if: always()                 # avvisa anche in caso di fallimento
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Notifica opzionale: attiva solo se i due secret Telegram sono presenti.
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Secret Telegram assenti: notifica saltata."; exit 0
          fi
          API="https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN"
          # Riepilogo: la summary.md piu' recente, o un messaggio di esito.
          SUMMARY="$(find reports/runs -name summary.md 2>/dev/null | sort | tail -1)"
          if [ -n "$SUMMARY" ]; then
            MSG="$(head -c 3500 "$SUMMARY")"
          else
            MSG="Autopilot $(date -u +'%Y-%m-%d %H:%M UTC'): run conclusa (esito ${{ job.status }})."
          fi
          curl -s -X POST "$API/sendMessage" \
            --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
            --data-urlencode "text=$MSG" >/dev/null || true
          # Allega gli EA generati (se presenti) come documenti.
          for f in mql5/*.mq5 mql4/*.mq4; do
            [ -e "$f" ] || continue
            curl -s -F "chat_id=$TELEGRAM_CHAT_ID" -F "document=@$f" \
              "$API/sendDocument" >/dev/null || true
          done
          # Allega il grafico equity, se prodotto.
          EQ="$(find reports/runs -name equity.png 2>/dev/null | sort | tail -1)"
          if [ -n "$EQ" ]; then
            curl -s -F "chat_id=$TELEGRAM_CHAT_ID" -F "photo=@$EQ" \
              "$API/sendPhoto" >/dev/null || true
          fi
