# CI: esegue la suite di test a ogni push e pull request.
# Garantisce che ogni modulo resti verde prima del merge (regola di progetto).
name: CI

on:
  push:
    branches: ["**"]          # tutti i branch
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]   # verifichiamo su due versioni

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip                       # cache delle dipendenze per build piu' veloci

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt   # dipendenze runtime della piattaforma
          pip install pytest                # framework di test

      - name: Run test suite
        run: pytest -q                       # configurazione in pyproject.toml
